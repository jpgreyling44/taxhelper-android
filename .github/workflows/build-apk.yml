name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: android-actions/setup-android@v3
      - name: Debug
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la app/
          cat app/build.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
      - name: Download gradle
        run: |
          curl -sLo gradlew https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew
          chmod +x gradlew
          mkdir -p gradle/wrapper
          curl -sLo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" > gradle/wrapper/gradle-wrapper.properties
      - name: Build
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: TaxHelper-Android-APK
          path: app/build/outputs/apk/debug/app-debug.apk
